name: Run trading bot

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: "Who triggered this run"
        required: false
        default: "manual"

  repository_dispatch:
    types: [iphone-trigger]

concurrency:
  group: trading-bot
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      LOG_LEVEL: INFO
      TRIGGER_SOURCE: ${{ github.event_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        run: python main.py

      - name: Notify failure
        if: failure()
        run: |
          curl -X POST $DISCORD_WEBHOOK \
          -H "Content-Type: application/json" \
          -d '{"content": "❌ Trading bot failed"}'