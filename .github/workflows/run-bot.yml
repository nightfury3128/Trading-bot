name: Run trading bot

on:
  workflow_dispatch:
  schedule:
    # Market open (9:30 AM ET ≈ 13:30 UTC)
    - cron: "30 12 * * 1-5"

    # 1 hour before close (3:00 PM ET ≈ 19:00 UTC)
    - cron: "0 18 * * 1-5"

    # --- INDIA MARKET (IST -> UTC) ---
    # Open: 9:15 AM IST
    - cron: "45 3 * * 1-5"
    # Noon: 12:00 PM IST
    - cron: "30 6 * * 1-5"
    # 2 PM: 2:00 PM IST
    - cron: "30 8 * * 1-5"
    # Close: 3:30 PM IST
    - cron: "0 10 * * 1-5"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      LOG_LEVEL: INFO
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        run: python main.py 
